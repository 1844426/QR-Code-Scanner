<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Scanner</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .header {
            position: absolute;
            top: 40px;
            font-size: 28px;
            font-weight: bold;
            color: #333;
            letter-spacing: 1px;
        }

        .scanner-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            aspect-ratio: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        canvas {
            display: none;
        }

        .scan-box {
            position: absolute;
            width: 250px;
            height: 250px;
            border: 3px solid #667eea;
            border-radius: 15px;
            background: transparent;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.3);
            z-index: 10;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.3), inset 0 0 0 3px #667eea;
            }
            50% {
                box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.3), inset 0 0 0 3px #764ba2;
            }
        }

        .corner {
            position: absolute;
            width: 30px;
            height: 30px;
            border: 3px solid #667eea;
        }

        .corner.top-left {
            top: -3px;
            left: -3px;
            border-right: none;
            border-bottom: none;
        }

        .corner.top-right {
            top: -3px;
            right: -3px;
            border-left: none;
            border-bottom: none;
        }

        .corner.bottom-left {
            bottom: -3px;
            left: -3px;
            border-right: none;
            border-top: none;
        }

        .corner.bottom-right {
            bottom: -3px;
            right: -3px;
            border-left: none;
            border-top: none;
        }

        .status {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            display: none;
            z-index: 20;
        }

        .status.active {
            display: block;
        }

        .status.scanning {
            background: #d4edda;
            color: #155724;
        }

        .status.detected {
            background: #00b894;
            color: white;
            animation: slideDown 0.5s ease;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .result-section {
            position: absolute;
            bottom: 40px;
            left: 20px;
            right: 20px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            display: none;
            z-index: 20;
        }

        .result-section.active {
            display: block;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .result-title {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .result-data {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 8px;
            word-break: break-all;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            margin-bottom: 12px;
            max-height: 80px;
            overflow-y: auto;
        }

        .result-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .zoom-indicator {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(102, 126, 234, 0.9);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            z-index: 20;
        }
    </style>
</head>
<body>
    <div class="header">QR CODE SCANNER</div>

    <div class="scanner-container">
        <video id="video" playsinline></video>
        <canvas id="canvas"></canvas>
        
        <div class="scan-box">
            <div class="corner top-left"></div>
            <div class="corner top-right"></div>
            <div class="corner bottom-left"></div>
            <div class="corner bottom-right"></div>
        </div>

        <div class="status scanning active" id="status">Scanning...</div>
        <div class="zoom-indicator" id="zoomIndicator">Zoom: 1x</div>
    </div>

    <div class="result-section" id="resultSection">
        <div class="result-title">Result</div>
        <div class="result-data" id="resultData"></div>
        <div class="result-actions">
            <button class="btn btn-primary" onclick="copyResult()">Copy</button>
            <button class="btn btn-primary" onclick="openLink()" id="openBtn" style="display: none;">Open</button>
            <button class="btn btn-secondary" onclick="clearResult()">Close</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const canvasContext = canvas.getContext('2d');
        const resultSection = document.getElementById('resultSection');
        const resultData = document.getElementById('resultData');
        const status = document.getElementById('status');
        const zoomIndicator = document.getElementById('zoomIndicator');

        let scanning = false;
        let currentZoom = 1;
        let stream = null;
        let detectedBefore = false;

        async function startScanning() {
            try {
                const constraints = {
                    video: {
                        facingMode: 'environment',
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    }
                };

                stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;

                video.addEventListener('loadedmetadata', () => {
                    video.play();
                    scanning = true;
                    scan();
                });
            } catch (error) {
                status.textContent = 'Camera access denied';
                status.className = 'status active';
            }
        }

        function scan() {
            if (!scanning) return;

            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;

                // Apply zoom
                const zoomWidth = canvas.width / currentZoom;
                const zoomHeight = canvas.height / currentZoom;
                const zoomX = (canvas.width - zoomWidth) / 2;
                const zoomY = (canvas.height - zoomHeight) / 2;

                canvasContext.drawImage(
                    video,
                    zoomX, zoomY, zoomWidth, zoomHeight,
                    0, 0, canvas.width, canvas.height
                );

                const imageData = canvasContext.getImageData(0, 0, canvas.width, canvas.height);
                const code = jsQR(imageData.data, imageData.width, imageData.height);

                if (code) {
                    if (!detectedBefore) {
                        // First detection - auto zoom in
                        autoZoomIn();
                    }
                    displayResult(code.data);
                    status.textContent = '✓ QR Code Detected!';
                    status.className = 'status active detected';
                    detectedBefore = true;
                } else {
                    if (detectedBefore && currentZoom > 1) {
                        // Gradually zoom out if no QR detected and we're zoomed
                        setTimeout(() => {
                            if (currentZoom > 1) {
                                currentZoom = Math.max(1, currentZoom - 0.1);
                                updateZoom();
                            }
                        }, 500);
                    }
                    if (detectedBefore) {
                        detectedBefore = false;
                    }
                }
            }

            requestAnimationFrame(scan);
        }

        function autoZoomIn() {
            const zoomInterval = setInterval(() => {
                if (currentZoom < 5) {
                    currentZoom = Math.min(currentZoom + 0.3, 5);
                    updateZoom();
                } else {
                    clearInterval(zoomInterval);
                }
            }, 50);
        }

        function updateZoom() {
            zoomIndicator.textContent = `Zoom: ${currentZoom.toFixed(1)}x`;
        }

        function displayResult(data) {
            resultData.textContent = data;
            resultSection.classList.add('active');

            const openBtn = document.getElementById('openBtn');
            if (data.startsWith('http://') || data.startsWith('https://')) {
                openBtn.style.display = 'block';
            } else {
                openBtn.style.display = 'none';
            }
        }

        function clearResult() {
            resultSection.classList.remove('active');
            resultData.textContent = '';
            currentZoom = 1;
            detectedBefore = false;
            updateZoom();
        }

        function copyResult() {
            const text = resultData.textContent;
            navigator.clipboard.writeText(text).then(() => {
                const btn = event.target;
                btn.textContent = 'Copied!';
                setTimeout(() => {
                    btn.textContent = 'Copy';
                }, 2000);
            });
        }

        function openLink() {
            const url = resultData.textContent;
            window.open(url, '_blank');
        }

        // Start scanning when page loads
        window.addEventListener('load', startScanning);

        // Stop scanning when page unloads
        window.addEventListener('beforeunload', () => {
            scanning = false;
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
        });
    </script>
</body>
</html>
