<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Scanner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .header {
            position: absolute;
            top: 40px;
            font-size: 28px;
            font-weight: bold;
            color: #333;
            letter-spacing: 1px;
        }

        .scanner-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            aspect-ratio: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
            border-radius: 20px;
            overflow: hidden;
        }

        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .scan-box {
            position: absolute;
            width: 250px;
            height: 250px;
            border: 3px solid #667eea;
            border-radius: 15px;
            background: transparent;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.4);
            z-index: 10;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                border-color: #667eea;
            }
            50% {
                border-color: #764ba2;
            }
        }

        .status {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 10px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            background: rgba(102, 126, 234, 0.9);
            color: white;
            z-index: 20;
        }

        .result-section {
            position: absolute;
            bottom: 40px;
            left: 20px;
            right: 20px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            display: none;
            z-index: 20;
        }

        .result-section.active {
            display: block;
            animation: slideUp 0.5s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .result-title {
            font-size: 12px;
            color: #999;
            text-transform: uppercase;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .result-data {
            background: #f5f5f5;
            padding: 12px;
            border-radius: 8px;
            word-break: break-all;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            margin-bottom: 12px;
            max-height: 80px;
            overflow-y: auto;
        }

        .result-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .error-message {
            color: #d32f2f;
            text-align: center;
            padding: 20px;
            background: #ffebee;
            border-radius: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="header">QR CODE SCANNER</div>

    <div class="scanner-container">
        <video id="video" playsinline autoplay muted></video>
        <div class="scan-box"></div>
        <div class="status" id="status">Scanning...</div>
    </div>

    <div class="result-section" id="resultSection">
        <div class="result-title">Result</div>
        <div class="result-data" id="resultData"></div>
        <div class="result-actions">
            <button class="btn btn-primary" onclick="copyResult()">Copy</button>
            <button class="btn btn-primary" onclick="openLink()" id="openBtn" style="display: none;">Open</button>
            <button class="btn btn-secondary" onclick="clearResult()">Close</button>
        </div>
    </div>

    <div id="errorContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
    <script>
        const video = document.getElementById('video');
        const resultSection = document.getElementById('resultSection');
        const resultData = document.getElementById('resultData');
        const status = document.getElementById('status');
        const errorContainer = document.getElementById('errorContainer');

        let scanning = false;
        let currentZoom = 1;
        let stream = null;
        let canvas = null;
        let canvasContext = null;
        let qrDetectedLastFrame = false;
        let zoomingIn = false;

        function showError(message) {
            errorContainer.innerHTML = `<div class="error-message">${message}</div>`;
        }

        async function startScanning() {
            try {
                const constraints = {
                    video: {
                        facingMode: { ideal: 'environment' },
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    },
                    audio: false
                };

                stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;

                video.onloadedmetadata = () => {
                    video.play();
                    scanning = true;
                    scan();
                };

            } catch (error) {
                showError('Camera access denied. Please allow camera permissions and try again.');
                status.textContent = 'Camera Error';
                console.error('Camera error:', error);
            }
        }

        function scan() {
            if (!scanning) return;

            if (!canvas) {
                canvas = document.createElement('canvas');
                canvasContext = canvas.getContext('2d', { willReadFrequently: true });
            }

            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;

                const zoomWidth = canvas.width / currentZoom;
                const zoomHeight = canvas.height / currentZoom;
                const zoomX = (canvas.width - zoomWidth) / 2;
                const zoomY = (canvas.height - zoomHeight) / 2;

                canvasContext.drawImage(
                    video,
                    zoomX, zoomY, zoomWidth, zoomHeight,
                    0, 0, canvas.width, canvas.height
                );

                try {
                    const imageData = canvasContext.getImageData(0, 0, canvas.width, canvas.height);
                    const code = jsQR(imageData.data, imageData.width, imageData.height);

                    if (code) {
                        if (!qrDetectedLastFrame && !zoomingIn) {
                            autoZoomIn();
                        }
                        displayResult(code.data);
                        qrDetectedLastFrame = true;
                    } else {
                        if (qrDetectedLastFrame && currentZoom > 1) {
                            zoomOut();
                        }
                        qrDetectedLastFrame = false;
                    }
                } catch (e) {
                    console.log('QR decode error:', e);
                }
            }

            requestAnimationFrame(scan);
        }

        function autoZoomIn() {
            zoomingIn = true;
            let targetZoom = Math.min(currentZoom + 1.5, 5);
            let steps = 10;
            let currentStep = 0;

            const zoomInterval = setInterval(() => {
                if (currentStep < steps) {
                    currentZoom = 1 + (targetZoom - 1) * (currentStep / steps);
                    currentStep++;
                } else {
                    currentZoom = targetZoom;
                    zoomingIn = false;
                    clearInterval(zoomInterval);
                }
            }, 30);
        }

        function zoomOut() {
            currentZoom = Math.max(currentZoom - 0.1, 1);
        }

        function displayResult(data) {
            resultData.textContent = data;
            resultSection.classList.add('active');

            const openBtn = document.getElementById('openBtn');
            if (data.startsWith('http://') || data.startsWith('https://')) {
                openBtn.style.display = 'block';
            } else {
                openBtn.style.display = 'none';
            }

            status.textContent = '✓ QR Code Found!';
        }

        function clearResult() {
            resultSection.classList.remove('active');
            resultData.textContent = '';
            currentZoom = 1;
            qrDetectedLastFrame = false;
            status.textContent = 'Scanning...';
        }

        function copyResult() {
            const text = resultData.textContent;
            navigator.clipboard.writeText(text).then(() => {
                const btn = event.target;
                const originalText = btn.textContent;
                btn.textContent = 'Copied!';
                setTimeout(() => {
                    btn.textContent = originalText;
                }, 2000);
            });
        }

        function openLink() {
            const url = resultData.textContent;
            window.open(url, '_blank');
        }

        window.addEventListener('load', () => {
            setTimeout(startScanning, 500);
        });

        window.addEventListener('beforeunload', () => {
            scanning = false;
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
        });
    </script>
</body>
</html>
