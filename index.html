<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto-Zoom QR Scanner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        #scanner-container {
            width: 90%;
            max-width: 500px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            background: #000;
        }
        #reader {
            width: 100%;
        }
        #status {
            margin-top: 20px;
            font-size: 1.1rem;
            color: #bb86fc;
            text-align: center;
            padding: 0 20px;
        }
    </style>
</head>
<body>

    <h2>AI Auto-Zoom QR Scanner</h2>
    <div id="scanner-container">
        <div id="reader"></div>
    </div>
    <div id="status">Scanning for QR codes...</div>

    <script>
        let html5QrCode;
        let cameraTrack = null;
        let isRedirecting = false;

        async function startScanner() {
            // Initialize the scanner
            html5QrCode = new Html5Qrcode("reader");

            const config = { 
                fps: 15, 
                qrbox: (width, height) => {
                    // Dynamic box size based on screen
                    return { width: width * 0.8, height: height * 0.8 };
                }
            };

            try {
                // Start with the back camera
                await html5QrCode.start(
                    { facingMode: "environment" }, 
                    config, 
                    onScanSuccess, 
                    onScanFailure
                );

                // Grab the raw camera track so we can programmatically zoom it
                const scannerElement = document.getElementById('reader__video');
                if (scannerElement && scannerElement.srcObject) {
                    cameraTrack = scannerElement.srcObject.getVideoTracks()[0];
                }
            } catch (err) {
                document.getElementById('status').innerText = "Camera error: " + err;
            }
        }

        function onScanSuccess(decodedText, decodedResult) {
            // Prevent accidental double-redirects
            if (isRedirecting) return;

            // Check if the decoded text looks like a URL
            if (decodedText.startsWith("http://") || decodedText.startsWith("https://")) {
                isRedirecting = true;
                document.getElementById('status').innerText = "Redirecting to: " + decodedText;
                
                // Automatically redirect the browser to the website
                setTimeout(() => {
                    window.location.href = decodedText;
                }, 800); 
            } else {
                document.getElementById('status').innerText = "Found text (not a link): " + decodedText;
            }
        }

        function onScanFailure(error) {
            // The library runs this loop constantly when it doesn't see a QR code.
            // This is where we handle the Auto-Zoom logic if a partial QR code or distant boundary is found.
            
            if (!cameraTrack) return;

            const capabilities = cameraTrack.getCapabilities();
            const settings = cameraTrack.getSettings();

            // Check if the device hardware actually supports digital zoom
            if (capabilities.zoom) {
                let currentZoom = settings.zoom || 1;
                let maxZoom = capabilities.zoom.max;

                /* CRITICAL LOGIC FOR DISTANT DETECTION:
                  Html5Qrcode passes detailed error objects. If it's a "No QR code found" error,
                  but the camera sees *something* that resembles a code border (often tagged in custom ML layers),
                  we can force a zoom. 
                  
                  For standard browser JS, we can implement a slight gradual zoom-in if it takes 
                  longer than 3 seconds without finding anything, helping it catch far away codes!
                */
                
                // Example: If a code is detected but fails to parse fully due to distance, boost zoom.
                if (error.includes("NotFoundException") && currentZoom < maxZoom) {
                    // Gently step up zoom by 0.5x increments to check further away
                    let nextZoom = Math.min(currentZoom + 0.1, maxZoom);
                    cameraTrack.applyConstraints({ advanced: [{ zoom: nextZoom }] });
                }
            }
        }

        // Start the scanner automatically when the page loads
        window.addEventListener('DOMContentLoaded', startScanner);
    </script>
</body>
</html>
