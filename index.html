<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto-Zoom & Auto-Flash QR Scanner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        #scanner-container {
            width: 90%;
            max-width: 500px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            background: #000;
            position: relative;
        }
        #reader {
            width: 100%;
        }
        #status {
            margin-top: 20px;
            font-size: 1.1rem;
            color: #bb86fc;
            text-align: center;
            padding: 0 20px;
            font-weight: bold;
        }
        #brightness-indicator {
            margin-top: 8px;
            font-size: 0.85rem;
            color: #888;
        }
    </style>
</head>
<body>

    <h2>AI Auto-Zoom & Flash QR Scanner</h2>
    <div id="scanner-container">
        <div id="reader"></div>
    </div>
    <div id="status">Initializing Camera...</div>
    <div id="brightness-indicator">Ambient Light: Calculating...</div>

    <canvas id="brightness-canvas" style="display:none;"></canvas>

    <script>
        let html5QrCode;
        let cameraTrack = null;
        let isRedirecting = false;
        let noCodeTimer = 0;
        let flashElementCreated = false;

        async function startScanner() {
            html5QrCode = new Html5Qrcode("reader");

            const config = { 
                fps: 20, 
                qrbox: (width, height) => {
                    return { width: width * 0.7, height: height * 0.7 };
                }
            };

            try {
                await html5QrCode.start(
                    { facingMode: "environment" }, 
                    config, 
                    onScanSuccess, 
                    onScanFailure
                );

                document.getElementById('status').innerText = "Scanning for QR codes...";

                // Capture the video track for Zoom and Torch control
                const videoElem = document.getElementById('reader__video');
                if (videoElem && videoElem.srcObject) {
                    cameraTrack = videoElem.srcObject.getVideoTracks()[0];
                    
                    // Start checking ambient light levels every 500ms
                    setInterval(() => {
                        checkBrightnessAndToggleFlash(videoElem);
                    }, 500);
                }
            } catch (err) {
                document.getElementById('status').innerText = "Camera error: " + err;
            }
        }

        function onScanSuccess(decodedText, decodedResult) {
            if (isRedirecting) return;

            if (decodedText.startsWith("http://") || decodedText.startsWith("https://")) {
                isRedirecting = true;
                document.getElementById('status').innerText = "Redirecting to: " + decodedText;
                
                setTimeout(() => {
                    window.location.href = decodedText;
                }, 500); 
            } else {
                document.getElementById('status').innerText = "Found text: " + decodedText;
            }
        }

        function onScanFailure(error) {
            noCodeTimer++;

            // DIGITAL ZOOM FALLBACK: Zoom video if no code found after ~2 seconds
            if (noCodeTimer > 40) {
                const videoElem = document.getElementById('reader__video');
                if (videoElem) {
                    videoElem.style.transform = "scale(1.5)";
                    videoElem.style.transition = "transform 0.5s ease";
                }
            }

            // HARDWARE ZOOM (For supported smartphones)
            if (!cameraTrack) return;
            try {
                const capabilities = cameraTrack.getCapabilities();
                const settings = cameraTrack.getSettings();
                if (capabilities.zoom && error.includes("NotFoundException")) {
                    let currentZoom = settings.zoom || 1;
                    let maxZoom = capabilities.zoom.max;
                    let nextZoom = Math.min(currentZoom + 0.1, Math.min(maxZoom, 3)); 
                    cameraTrack.applyConstraints({ advanced: [{ zoom: nextZoom }] });
                }
            } catch(e) {
                // Fail silently if hardware configurations fight back
            }
        }

        function checkBrightnessAndToggleFlash(videoElem) {
            if (!cameraTrack) return;

            const canvas = document.getElementById('brightness-canvas');
            const ctx = canvas.getContext('2d');
            
            // Set tiny canvas dimensions just to sample light data quickly
            canvas.width = 40;
            canvas.height = 30;

            try {
                // Draw current video frame onto hidden canvas
                ctx.drawImage(videoElem, 0, 0, canvas.width, canvas.height);
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;

                let r, g, b, avg;
                let colorSum = 0;

                // Loop through pixels to sum up brightness
                for(let x = 0, len = data.length; x < len; x += 4) {
                    r = data[x];
                    g = data[x+1];
                    b = data[x+2];

                    // Standard perceived brightness formula
                    avg = Math.floor((r + g + b) / 3);
                    colorSum += avg;
                }

                // Calculate brightness value (0 is completely pitch black, 255 is pure white)
                const brightness = Math.floor(colorSum / (canvas.width * canvas.height));
                document.getElementById('brightness-indicator').innerText = `Ambient Light Level: ${brightness}/255`;

                // Try to toggle physical torch if device supports it
                const capabilities = cameraTrack.getCapabilities();
                if (capabilities.torch) {
                    // Threshold: If brightness drops below 50, turn on the flash!
                    const shouldFlashBeOn = (brightness < 50); 
                    cameraTrack.applyConstraints({
                        advanced: [{ torch: shouldFlashBeOn }]
                    });
                }
            } catch (e) {
                // Canvas reading can occasionally fail if track isn't fully loaded yet
            }
        }

        window.addEventListener('DOMContentLoaded', startScanner);
    </script>
</body>
</html>
